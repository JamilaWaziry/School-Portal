<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="layout">
        <div class="top-bar">
            <button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
            <button id="themeToggle" class="theme-btn"> <i class="fas fa-moon"></i></button>
        </div>
        <nav class="sidebar" id="sidebar">
            <h1 class="brand">Bright Future</h1>
            <ul class="navLinks">
                <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="profile.html"><i class="fas fa-user"></i> Profile</a></li>
                <li><a href="courses.html"><i class="fas fa-book"></i> Courses</a></li>
                <li><a href="contact.html"><i class="fas fa-envelope"></i> Contact</a></li>
            </ul>

            <div class="sidebar-bottom">
                <hr>
                <ul>

                    <li><a href="#"><i class="fas fa-question-circle"></i> Help</a></li>
                    <li><a href="#"><i class="fas fa-cog"></i> Settings</a></li>
                    <li><a href="#"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
                </ul>
            </div>
        </nav>
        <main class="content">

            <section class="profile-wrapper">

                <!--profile top -->
                <div class="profile-card">

                    <div class="profile-header">
                        <img src="https://i.pravatar.cc/150?img=12" alt="Profile Picture" class="profile-img">

                        <div class="profile-info">
                            <h1 id="pName"></h1>

                            <div class="student-badge">
                                <i class="fas fa-user-graduate"></i>
                                Student Dashboard
                            </div>
                        </div>
                    </div>

                    <!-- detial -->
                    <div class="profile-details">

                        <div class="detail-box">
                            <span>Age</span>
                            <h3 id="pAge">16</h3>
                        </div>

                        <div class="detail-box">
                            <span>Grade</span>
                            <h3 id="pGrade">10</h3>
                        </div>

                        <div class="detail-box">
                            <span>Status</span>
                            <h3 id="status" class="active-status">Active</h3>
                        </div>

                    </div>

                </div>

                <!-- contact-->
                <div class="contact-card">

                    <h2>Contact Information</h2>

                    <div class="profile-buttons">

                        <button id="showEmail" class="proBtn">
                            <i class="fas fa-envelope"></i>
                            Email
                        </button>

                        <button id="showPhone" class="proBtn">
                            <i class="fas fa-phone"></i>
                            Phone
                        </button>

                        <button id="hideInfo" class="proBtn">
                            <i class="fas fa-eye-slash"></i>
                            Hide
                        </button>

                    </div>

                    <div id="contactInfo" class="contact-info-box">
                        Contact information will appear here
                    </div>

                </div>

                <!-- status update -->
                <div class="status-card">

                    <h2>Update Student Status</h2>

                    <div class="status-form">

                        <input id="newStatus" placeholder="Enter new status">

                        <button class="updateStatus">
                            <i class="fas fa-sync-alt"></i>
                            Update Status
                        </button>

                    </div>

                </div>

            </section>

        </main>
    </div>

    <script src="script.js"></script>



</body>

</html>
