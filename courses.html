<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="layout">

        <div class="top-bar">
            <button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
            <button id="themeToggle" class="theme-btn"> <i class="fas fa-moon"></i></button>
        </div>
        <nav class="sidebar" id="sidebar">
            <h1 class="brand">Bright Future</h1>
            <ul class="navLinks">
                <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="profile.html"><i class="fas fa-user"></i> Profile</a></li>
                <li><a href="courses.html"><i class="fas fa-book"></i> Courses</a></li>
                <li><a href="contact.html"><i class="fas fa-envelope"></i> Contact</a></li>
            </ul>

            <div class="sidebar-bottom">
                <hr>
                <ul>

                    <li><a href="#"><i class="fas fa-question-circle"></i> Help</a></li>
                    <li><a href="#"><i class="fas fa-cog"></i> Settings</a></li>
                    <li><a href="#"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
                </ul>
            </div>
        </nav>
        <main class="content">

            <section class="courses-wrapper">


                <div class="courses-header">

                    <div>
                        <h1>Courses</h1>
                        <p>Manage school courses and explore available classes.</p>
                    </div>

                    <div class="course-icon">
                        <i class="fas fa-book-open"></i>
                    </div>

                </div>


                <div class="tools-card">

                    <div class="filters">

                        <button data-grade="all">All</button>
                        <button data-grade="10">Grade 10</button>
                        <button data-grade="11">Grade 11</button>

                    </div>

                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search" placeholder="Search courses...">
                    </div>

                </div>

                <!-- course list -->
                <div id="courseList" class="grid"></div>

                <!-- detail -->
                <div id="courseDetails"></div>

                <!-- new corse -->
                <div class="add-course-card">

                    <h2>Add New Course</h2>

                    <form id="courseForm">

                        <div class="input-group">
                            <label>Course Name</label>
                            <input type="text" id="cName" placeholder="Enter course name">
                        </div>

                        <div class="input-group">
                            <label>Instructor</label>
                            <input type="text" id="cInstructor" placeholder="Instructor name">
                        </div>

                        <div class="input-group">
                            <label>Grade</label>
                            <input type="number" id="cGrade" placeholder="Grade level">
                        </div>

                        <div class="input-group">
                            <label>Description</label>
                            <input id="cDesc" placeholder="Course description">
                        </div>

                        <button class="add-btn">
                            <i class="fas fa-plus-circle"></i>
                            Add Course
                        </button>

                    </form>

                </div>

            </section>

        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
